<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 900 340"
     width="900" height="340"
     style="max-width:100%">

  <defs>
    <linearGradient id="crawl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5CE0D8" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#5CE0D8" stop-opacity="0.6"/>
      <stop offset="40%"  stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="60%"  stop-color="#5CE0D8" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#5CE0D8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5CE0D8" stop-opacity="0"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-200%" width="140%" height="500%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feGaussianBlur stdDeviation="2" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#5CE0D8" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="340" rx="14" fill="#0d1117"/>
  <rect width="900" height="340" rx="14" fill="url(#grid)"/>

  <!-- STATIC BASELINE BORDER -->
  <rect x="3" y="3" width="894" height="334" rx="12"
        fill="none" stroke="#1e2a38" stroke-width="1.5"/>

  <!-- CRAWLING BORDER -->
  <rect x="3" y="3" width="894" height="334" rx="12"
        fill="none"
        stroke="url(#crawl)"
        stroke-width="3"
        stroke-linecap="round"
        filter="url(#neon)"
        stroke-dasharray="900 1556">
    <animate attributeName="stroke-dashoffset"
             from="0" to="-2456"
             dur="5s"
             repeatCount="indefinite"
             calcMode="linear"/>
  </rect>

  <!-- Second layer — thinner, offset -->
  <rect x="3" y="3" width="894" height="334" rx="12"
        fill="none"
        stroke="#5CE0D8"
        stroke-width="1"
        stroke-opacity="0.25"
        stroke-linecap="round"
        stroke-dasharray="500 1956">
    <animate attributeName="stroke-dashoffset"
             from="-1228" to="-3684"
             dur="5s"
             repeatCount="indefinite"
             calcMode="linear"/>
  </rect>

  <!-- CORNER BRACKETS -->
  <g fill="none" stroke="#5CE0D8" stroke-width="2"
     stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <polyline points="3,30 3,3 30,3"/>
    <polyline points="870,3 897,3 897,30"/>
    <polyline points="3,310 3,337 30,337"/>
    <polyline points="870,337 897,337 897,310"/>
  </g>
  <g fill="#5CE0D8" opacity="0.7">
    <circle cx="3"   cy="3"   r="2.5"/>
    <circle cx="897" cy="3"   r="2.5"/>
    <circle cx="3"   cy="337" r="2.5"/>
    <circle cx="897" cy="337" r="2.5"/>
  </g>

  <!-- LARGE NAME: DINESH YDK -->
  <text x="450" y="105"
        font-family="'Courier New', Courier, monospace"
        font-size="56"
        font-weight="bold"
        fill="#5CE0D8"
        text-anchor="middle"
        letter-spacing="12"
        filter="url(#textGlow)">
    DINESH YDK
  </text>

  <!-- DIVIDER -->
  <line x1="60" y1="135" x2="840" y2="135" stroke="#5CE0D8" stroke-width="0.6" opacity="0.2"/>
  <line x1="150" y1="135" x2="350" y2="135" stroke="#5CE0D8" stroke-width="1.2" opacity="0.5"/>
  <line x1="550" y1="135" x2="750" y2="135" stroke="#5CE0D8" stroke-width="1.2" opacity="0.5"/>

  <!-- SUBTITLE -->
  <text x="450" y="170"
        font-family="'Courier New', Courier, monospace"
        font-size="12"
        fill="#8b949e"
        text-anchor="middle"
        letter-spacing="4">
    FULL-STACK DEVELOPER  ·  IIT ISM DHANBAD  ·  COMPETITIVE PROGRAMMER
  </text>

  <!-- STACK ROW -->
  <text x="450" y="200"
        font-family="'Courier New', Courier, monospace"
        font-size="10.5"
        fill="#5CE0D8"
        text-anchor="middle"
        letter-spacing="2.5"
        opacity="0.6">
    C++  ·  React  ·  Next.js  ·  Node.js  ·  PostgreSQL  ·  MongoDB  ·  Python
  </text>

  <!-- HORIZONTAL RULE -->
  <line x1="60" y1="225" x2="840" y2="225" stroke="#1e2a38" stroke-width="1"/>

  <!-- PULSING DOT -->
  <circle cx="220" cy="268" r="5" fill="#5CE0D8" opacity="0.2">
    <animate attributeName="r"       values="5;9;5"     dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="220" cy="268" r="4.5" fill="#5CE0D8">
    <animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/>
  </circle>

  <!-- STATUS TEXT -->
  <text x="236" y="273"
        font-family="'Courier New', Courier, monospace"
        font-size="11.5"
        fill="#c9d1d9"
        letter-spacing="1">
    Open to Summer 2026 Internship Opportunities
  </text>

  <!-- AVAILABLE TAG -->
  <text x="820" y="273"
        font-family="'Courier New', Courier, monospace"
        font-size="10"
        fill="#5CE0D8"
        text-anchor="end"
        opacity="0.4"
        letter-spacing="1">
    [ AVAILABLE ]
  </text>

  <!-- BOTTOM SCAN LINE -->
  <rect x="3" y="320" width="894" height="1.5" rx="0.5" fill="#5CE0D8" opacity="0.07"/>

</svg>
