<svg xmlns="http://www.w3.org/2000/svg" width="800" height="320" viewBox="0 0 800 320">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Terminal window -->
  <rect width="800" height="320" rx="12" ry="12" fill="url(#termBg)" stroke="#30363d" stroke-width="1"/>
  
  <!-- Title bar -->
  <rect width="800" height="38" rx="12" ry="12" fill="#161b22"/>
  <rect x="0" y="26" width="800" height="12" fill="#161b22"/>
  
  <!-- Traffic lights -->
  <circle cx="24" cy="19" r="7" fill="#ff5f57"/>
  <circle cx="46" cy="19" r="7" fill="#febc2e"/>
  <circle cx="68" cy="19" r="7" fill="#28c840"/>
  
  <!-- Title text -->
  <text x="400" y="23" font-family="SF Mono, Monaco, Menlo, monospace" font-size="13" fill="#8b949e" text-anchor="middle">dinesh@iitism — ~</text>
  
  <!-- Terminal content -->
  <text font-family="JetBrains Mono, SF Mono, Monaco, Menlo, Consolas, monospace" font-size="13.5" fill="#c9d1d9">
    <!-- Prompt line -->
    <tspan x="24" y="72" fill="#5CE0D8">❯</tspan>
    <tspan fill="#c9d1d9"> cat </tspan>
    <tspan fill="#5CE0D8">about_me.ts</tspan>
    
    <!-- Code block -->
    <tspan x="24" y="100" fill="#7c7cff">const</tspan>
    <tspan fill="#c9d1d9"> dinesh </tspan>
    <tspan fill="#7c7cff">=</tspan>
    <tspan fill="#c9d1d9"> {</tspan>
    
    <tspan x="48" y="122" fill="#8b949e">location:</tspan>
    <tspan fill="#c9d1d9">      </tspan>
    <tspan fill="#a5d6a7">"IIT (ISM) Dhanbad 🏛️"</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    
    <tspan x="48" y="144" fill="#8b949e">degree:</tspan>
    <tspan fill="#c9d1d9">        </tspan>
    <tspan fill="#a5d6a7">"B.Tech CSE — 2nd Year (2024–2028)"</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    
    <tspan x="48" y="166" fill="#8b949e">focus:</tspan>
    <tspan fill="#c9d1d9">         [</tspan>
    <tspan fill="#a5d6a7">"Full-Stack"</tspan>
    <tspan fill="#c9d1d9">, </tspan>
    <tspan fill="#a5d6a7">"Backend Systems"</tspan>
    <tspan fill="#c9d1d9">, </tspan>
    <tspan fill="#a5d6a7">"AI Integration"</tspan>
    <tspan fill="#c9d1d9">],</tspan>
    
    <tspan x="48" y="188" fill="#8b949e">building:</tspan>
    <tspan fill="#c9d1d9">      </tspan>
    <tspan fill="#a5d6a7">"Production apps with real users &amp; real payments"</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    
    <tspan x="48" y="210" fill="#8b949e">learning:</tspan>
    <tspan fill="#c9d1d9">      </tspan>
    <tspan fill="#a5d6a7">"System Design &amp; Advanced DSA"</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    
    <tspan x="48" y="232" fill="#8b949e">philosophy:</tspan>
    <tspan fill="#c9d1d9">    </tspan>
    <tspan fill="#a5d6a7">"Understand the architecture first, then write the code."</tspan>
    <tspan fill="#c9d1d9">,</tspan>
    
    <tspan x="48" y="254" fill="#8b949e">funFact:</tspan>
    <tspan fill="#c9d1d9">       </tspan>
    <tspan fill="#a5d6a7">"I solve Rubik's Cubes IRL &amp; built an app for it 🧩"</tspan>
    
    <tspan x="24" y="276" fill="#c9d1d9">};</tspan>
  </text>
  
  <!-- Blinking cursor -->
  <rect x="24" y="290" width="9" height="16" fill="#5CE0D8" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>